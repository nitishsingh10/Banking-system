<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GBI Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/guard.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="bi bi-bank2"></i> GBI Bank
        </div>
        <div class="navbar-nav">
            <div class="navbar-user">
                <i class="bi bi-person-circle"></i> <span id="userEmail"></span>
            </div>
            <button id="logoutBtn" class="btn-secondary"
                style="padding: 0.5rem 1rem; border-radius: 8px; width: auto;"><i class="bi bi-box-arrow-right"></i>
                Logout</button>
        </div>
    </nav>

    <div class="app-container">
        <div class="mb-4">
            <h2 style="font-weight: 800; letter-spacing: -0.02em;">Welcome back</h2>
            <p>Here's a summary of your account</p>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column: Balance & Actions -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="balance-card">
                    <h3>Available Balance</h3>
                    <h3 id="balance">***.**</h3>
                    <button id="checkBalanceBtn" class="action-btn btn-primary" style="margin-top: 1rem;"><i
                            class="bi bi-eye"></i> Show Balance</button>
                </div>

                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Quick Actions</h3>
                    <div class="action-buttons">
                        <button onclick="location.href='send-money.html'" class="btn-primary"
                            style="background-color: var(--primary-color);"><i class="bi bi-send"></i> Send
                            Money</button>
                        <button onclick="location.href='wallet.html'" class="btn-secondary"><i
                                class="bi bi-wallet2"></i> View Wallet & Add Funds</button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Transactions -->
            <div class="card" style="padding: 2rem;">
                <div class="flex-between mb-3">
                    <h3 style="margin-bottom: 0;"><i class="bi bi-clock-history"></i> Recent Transactions</h3>
                    <a href="wallet.html" style="font-size: 0.9rem;">View All <i class="bi bi-arrow-right"></i></a>
                </div>
                <div id="transactionList" class="transaction-list">
                    <!-- Transactions populated here -->
                </div>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/dashboard.js"></script>
</body>

</html>
