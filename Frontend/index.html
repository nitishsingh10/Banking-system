<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda Bank of IOI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f8fc;
            color: #1e3a5f;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right,white,rgb(0, 145, 255));
        }

        .container {
            width: 60%;
            margin: 100px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: white;
            margin-bottom: 10px;
        }

        p {
            color: #4a5568;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 22px;
            margin: 10px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .signup {
            background-color: #00baf2;
            color: white;
        }

        .login {
            background-color: #002970;
            color: white;
        }

        .signup:hover {
            background-color: #0099d4;
            transform: scale(1.05);
        }

        .login:hover {
            background-color: #001f54;
            transform: scale(1.05);
        }

        hr {
            border: 1px solid #00baf2;
            margin: 25px 0;
        }

        .Why {
            color: #002970;
            margin-bottom: 20px;
        }

        .feature {
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            background-color: white;
            transition: 0.3s;
            color: #1e3a5f;
        }

        .feature:hover {
            background-color: white;
            color: #002970;
            cursor: pointer;
            transform: translateY(-2px);
        }
    </style>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">

        <h1>🏦 BANK WALLAH</h1>

        <p>Secure Digital Banking at Your Fingertips</p>

        <a href="register.html" class="btn signup">Sign Up Now</a>

        <a href="login.html" class="btn login">Login Here</a>

        <hr>

        <h3 class="Why">Why Choose Us?</h3>

        <div class="feature">✔ Safe Banking</div>

        <div class="feature">✔ Fast Transactions</div>

        <div class="feature">✔ 24/7 Customer Support</div>

    </div>

</body>
</html>
