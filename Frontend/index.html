<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBI Bank - Secure Digital Banking</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card">
            <header class="mb-4" style="text-align: center;">
                <div class="navbar-brand" style="justify-content: center; font-size: 2rem; margin-bottom: 0.5rem;">
                    <i class="bi bi-bank2"></i> GBI Bank
                </div>
                <p class="subtitle" style="margin-top: 0;">Secure digital banking at your fingertips</p>
            </header>
            
            <div class="form-group" style="text-align: center; margin-bottom: 2rem;">
                <p style="font-weight: 500; color: var(--text-dark);">Join us today and experience the future of banking!</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="register.html" class="btn-primary"><i class="bi bi-person-plus"></i> Create an Account</a>
                <a href="login.html" class="btn-secondary" style="display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600;"><i class="bi bi-box-arrow-in-right"></i> Login</a>
            </div>
            
            <div class="mt-4" style="border-top: 1px solid var(--card-border); padding-top: 1.5rem;">
                <h3 style="font-size: 1.1rem; color: var(--text-gray);">Features</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left; margin-top: 1rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;"><i class="bi bi-shield-lock" style="color: var(--primary-color);"></i> <span style="font-size: 0.9rem;">Secure banking</span></div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;"><i class="bi bi-headset" style="color: var(--primary-color);"></i> <span style="font-size: 0.9rem;">Email alerts</span></div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;"><i class="bi bi-send" style="color: var(--primary-color);"></i> <span style="font-size: 0.9rem;">Fund transfers</span></div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;"><i class="bi bi-phone" style="color: var(--primary-color);"></i> <span style="font-size: 0.9rem;">Mobile app</span></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
