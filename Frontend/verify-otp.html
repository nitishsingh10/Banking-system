<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/guard.js"></script>
</head>
<body class="background-image">
    <div id="otpForm" class="card">
        <h1><i class="bi bi-shield-check"></i> Verify Your Account</h1>
        <p>Please enter the otp sent to your registered email</p>
        <p>Otp is valid for only 10 minutes</p>
        <label for="otp"><i class="bi bi-key"></i> Enter the Otp Correctly</label><br>
        <input type="text" id="otpField" placeholder="OTP">
        <br>
        <p id="errorMsg" style="color: red; display: none;"></p>
        <br>
        <button id="submitOtp" class="btn-primary"><i class="bi bi-check-circle"></i> Verify</button>
        <br><br>
        <p>The otp sent to your email is valid only for 10 minutes after that you will have to restart the process again</p>
    </div>
    
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/verifyOtp.js"></script>
</body>
</html>
