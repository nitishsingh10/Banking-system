<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Here !</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="auth-container">
        <div id="loginForm" class="card auth-card">
            <h1>Your Thoughts 😊</h1>
            <p class="subtitle">Please give your thoughts towards this project</p>
            
            <div class="form-group">
                <label for="userName">Your Name ✨</label>
                <input type="email" id="userName" placeholder="Anonymous">
            </div>
            <div class="form-group">
                <label class="rating-label">Rate your experience </label>
                
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5"/>
                    <label for="star5" title="5 stars">&#9733;</label>
                    
                    <input type="radio" id="star4" name="rating" value="4" />
                    <label for="star4" title="4 stars">&#9733;</label>
                    
                    <input type="radio" id="star3" name="rating" value="3" />
                    <label for="star3" title="3 stars">&#9733;</label>
                    
                    <input type="radio" id="star2" name="rating" value="2" />
                    <label for="star2" title="2 stars">&#9733;</label>
                    
                    <input type="radio" id="star1" name="rating" value="1" />
                    <label for="star1" title="1 star">&#9733;</label>
                </div>
            </div>

            
            <div class="form-group">
                <label for="commentBlock">Comment 💬</label>
                <textarea name="comments" id="commentBlock" class="fixed-textarea" placeholder="Your feedback and suggestions.."></textarea>
            </div>
            
            <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></p>

            <button id="submitBtn" class="btn-primary mb-3"><i class="bi bi-box-arrow-in-right"></i> Submit</button>
            
            <a href="index.html" style="font-size: 0.85rem; color: var(--text-light);"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/rate.js"></script>
</body>
</html>
