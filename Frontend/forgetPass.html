<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- <script src="./js/guard.js"></script> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="auth-container">
        <div id="loginForm" class="card auth-card">
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your credentials to get back your account</p>
            
            <div class="form-group">
                <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="registered email">
            </div>
            <a href="" id="sendOtp">Send Otp</a>

            <div class="form-group mb-3">
                <label for="OTP"><i class="bi bi-lock"></i> OTP</label>
                <input type="text" id="OTP" placeholder="6 digit OTP" disabled>
            </div>
            
            <div class="form-group mb-3">
                <label for="newPassword"><i class="bi bi-lock"></i> New Password</label>
                <input type="password" id="newPassword" placeholder="your new password" disabled>
            </div>
            
            <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></p>

            <button id="resetBtn" class="btn-primary mb-3"><i class="bi bi-box-arrow-in-right"></i> Reset</button>
            
            <p style="font-size: 0.95rem;">Don't have an account? <a href="register.html">Create one now</a></p>
            <div class="mt-3">
                <a href="index.html" style="font-size: 0.85rem; color: var(--text-light);"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/forgetPass.js"></script>
</body>
</html>
