<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GBI Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="auth-container">
        <div id="registerForm" class="card auth-card">
            <h1>Create your Account</h1>
            <p class="subtitle">Enter the following details to join GBI</p>
            
            <div class="form-group">
                <label for="name"><i class="bi bi-person"></i> Full Name</label>
                <input type="text" id="name" placeholder="your name" required>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Min 8 characters" required>
            </div>
            
            <div class="form-group">
                <label for="phone"><i class="bi bi-telephone"></i> Phone Number</label>
                <input type="text" id="phone" placeholder="9876543210" required>
            </div>
            
            <div class="form-group mb-3">
                <label for="address"><i class="bi bi-geo-alt"></i> Address</label>
                <input type="text" id="address" placeholder="123 Bank St, City" required>
            </div>
     
            <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></p>
     
            <button id="registerBtn" class="btn-primary mb-3"><i class="bi bi-person-plus"></i> Register</button>
            <p style="font-size: 0.95rem;">Already have an account? <a href="login.html">Login here</a></p>
            <div class="mt-3">
                <a href="index.html" style="font-size: 0.85rem; color: var(--text-light);"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/register.js"></script>
</body>
</html>
