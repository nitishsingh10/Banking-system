<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="background-image">
    <div id="registerForm" class="card">
        <h1>Create your GBI Account</h1>
        <p>Enter the following details</p>
        <div>
            <label for="name"><i class="bi bi-person"></i> Full Name</label><br>
            <input type="text" id="name" placeholder="your name" required>
        </div>
        <br>
        <div>
            <label for="email"><i class="bi bi-envelope"></i> Email</label><br>
            <input type="email" id="email" placeholder="xyz@gmail.com" required>
        </div>
        <br>
        <div>
            <label for="password"><i class="bi bi-lock"></i> Password</label><br>
            <input type="password" id="password" placeholder="Min 8 characters" required>
        </div>
        <br>
        <div>
            <label for="phone"><i class="bi bi-telephone"></i> Phone</label><br>
            <input type="text" id="phone" placeholder="9876543210" required>
        </div>
        <br>
        <div>
            <label for="address"><i class="bi bi-geo-alt"></i> Address</label><br>
            <input type="text" id="address" placeholder="ex : yello, whitefield" required>
        </div>
        <br>
 
        <p id="errorMsg" style="display:none; color:red;"></p>
 
        <button id="registerBtn" class="btn-primary"><i class="bi bi-person-plus"></i> Register</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/register.js"></script>
</body>
</html>
