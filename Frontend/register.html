<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - GBI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f8fc;
            color: #002970;
            text-align: center;
            margin: 0;
            background: linear-gradient(to right,white,rgb(0, 145, 255));
        }

        h1 {
            color: #00baf2;
            margin-top: 40px;
        }

        p {
            color: #4a5568;
        }

        #registerForm {
            width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #002970;
            font-weight: bold;
        }

        input {
            width: 95%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:hover {
            border-color: #00baf2;
        }

        input:focus {
            border-color: #00baf2;
            box-shadow: 0px 0px 5px rgba(0, 186, 242, 0.4);
        }

        #registerBtn {
            margin-top: 20px;
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            background-color: #00baf2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #registerBtn:hover {
            background-color: #0099d4;
            transform: scale(1.05);
        }

        a {
            color: #00baf2;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        #errorMsg {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🏦 Create Your GBI Account</h1>
    <p>Enter the following details</p>

    <div id="registerForm">

        <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your Name" required>
        </div>

        <br>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="xyz@gmail.com" required>
        </div>

        <br>

        <div>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Minimum 8 characters" required>
        </div>

        <br>

        <div>
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="9876543210" required>
        </div>

        <br>

        <div>
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="Whitefield, Bangalore" required>
        </div>

        <p id="errorMsg" style="display:none; color:red;"></p>

        <button id="registerBtn">Register</button>

    </div>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/register.js"></script>

</body>
</html>
