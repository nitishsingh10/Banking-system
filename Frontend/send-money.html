<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f8fc;
        color: #002970;
        text-align: center;
        margin: 0;
        background: linear-gradient(to right,white,rgb(0, 145, 255));
    }

    .container {
        width: 400px;
        margin: 80px auto;
        padding: 30px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
        color: #00baf2;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 10px;
        margin-bottom: 5px;
        color: #002970;
        font-weight: bold;
    }

    input {
        width: 95%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
        transition: 0.3s;
    }

    input:hover {
        border-color: #00baf2;
    }

    input:focus {
        border-color: #00baf2;
        box-shadow: 0px 0px 5px rgba(0, 186, 242, 0.4);
    }

    a {
        color: #00baf2;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }

    #sendBtn,
    #closeModalBtn {
        margin-top: 15px;
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        background-color: #00baf2;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    #sendBtn:hover,
    #closeModalBtn:hover {
        background-color: #0099d4;
        transform: scale(1.05);
    }

    /* Modal Styling */
    #transactionModal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 41, 112, 0.4);
    }

    .modalContent {
        background-color: white;
        color: #002970;
        margin: 15% auto;
        padding: 20px;
        border-radius: 15px;
        width: 320px;
        text-align: center;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.15);
    }

    .success {
        background-color: #00baf2;
        color: white;
    }

    .error {
        background-color: #ff4d4f;
        color: white;
    }
</style>
