<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Money</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/guard.js"></script>
</head>

<body class="background-image">
    <div class="card">
        <h1><i class="bi bi-send"></i> Send Money</h1>
        <a href="dashboard.html"><i class="bi bi-arrow-left"></i> dashboard</a><br><br>
        <div id="sendMoneyForm">
            <label for="receiverEmail"><i class="bi bi-envelope"></i> Receiver Email:</label><br>
            <input type="email" id="receiverEmail" required>
            <br>
            <label for="amount"><i class="bi bi-currency-dollar"></i> Amount:</label><br>
            <input type="number" id="amount" required>
            <br>
            <label for="note"><i class="bi bi-card-text"></i> Note:</label><br>
            <input type="text" id="note">
            <br><br>
            <button id="sendBtn" class="btn-primary"><i class="bi bi-send"></i> Send Money</button>
        </div>
    </div>


    <div id="transactionModal">
        <div class="modalContent" id="modalContent">
            <h3>Transaction Details</h3>

            <div id="modalDetails"></div>
            <br>

            <button id="closeModalBtn" class="btn-primary"><i class="bi bi-x-circle"></i> Close</button>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/sendMoney.js"></script>
</body>

</html>
