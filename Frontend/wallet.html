<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wallet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/guard.js"></script>
</head>

<body class="background-image">
    <div class="card" style="max-width: 800px;">
        <h2><i class="bi bi-wallet2"></i> Your Wallet summary</h2>
        <p id="userEmail"></p>
        <a href="dashboard.html"><i class="bi bi-arrow-left"></i> dashboard</a>
        <div class="wallet-summary">
            <h4 id="currentBalance">Current Balance</h4>

            <h4><i class="bi bi-cash-coin"></i> Add Funds</h4>
            <input type="number" id="amount" placeholder="Enter amount" />
            <button id="addFundsBtn" class="btn-primary"><i class="bi bi-plus-circle"></i> Add Funds</button>

            <h3><i class="bi bi-clock-history"></i> Transaction History : </h3>

            <div id="transactionHistory">
                No transactions found.
            </div>

        </div>
    </div>

    <div id="transactionModal">
        <div class="modalContent" id="modalContent">
            <h3>Transaction Details</h3>

            <div id="modalDetails"></div>
            <br>

            <button id="closeModalBtn" class="btn-primary"><i class="bi bi-x-circle"></i> Close</button>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/wallet-page.js"></script>
</body>

</html>
