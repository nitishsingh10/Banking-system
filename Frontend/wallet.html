<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f8fc;
        color: #002970;
        text-align: center;
        margin: 0;
        background: linear-gradient(to right,white,rgb(0, 145, 255));
    }

    .container {
        width: 70%;
        max-width: 700px;
        margin: 50px auto;
        padding: 30px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2, h3, h4 {
        color: #00baf2;
    }

    a {
        color: #00baf2;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }

    hr {
        border: 1px solid #dbeafe;
        margin: 20px 0;
    }

    input {
        width: 220px;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
        transition: 0.3s;
    }

    input:hover {
        border-color: #00baf2;
    }

    input:focus {
        border-color: #00baf2;
        box-shadow: 0px 0px 5px rgba(0, 186, 242, 0.4);
    }

    #addFundsBtn {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background-color: #00baf2;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-left: 10px;
    }

    #addFundsBtn:hover {
        background-color: #0099d4;
        transform: scale(1.05);
    }

    /* Transaction Cards */
    .transaction-card {
        width: 90%;
        margin: 12px auto;
        padding: 15px;
        border-radius: 12px;
        text-align: left;
        transition: 0.3s;
        background-color: white;
    }

    .transaction-card:hover {
        transform: translateY(-3px);
    }

    .credit {
        border-left: 6px solid #22c55e;
        background-color: #f0fdf4;
        box-shadow: 0px 2px 8px rgba(34, 197, 94, 0.15);
    }

    .debit {
        border-left: 6px solid #ef4444;
        background-color: #fef2f2;
        box-shadow: 0px 2px 8px rgba(239, 68, 68, 0.15);
    }

    .deposit {
        border-left: 6px solid #00baf2;
        background-color: #f0f9ff;
        box-shadow: 0px 2px 8px rgba(0, 186, 242, 0.15);
    }

    #transactionHistory {
        margin-top: 20px;
    }

    #currentBalance {
        color: #002970;
        font-size: 28px;
        font-weight: bold;
    }

    #userEmail {
        color: #6b7280;
    }
</style>
