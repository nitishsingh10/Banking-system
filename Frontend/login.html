<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GBI Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="auth-container">
        <div id="loginForm" class="card auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Enter your credentials to access your account</p>
            
            <div class="form-group">
                <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="registered email">
            </div>
            
            <div class="form-group mb-3">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="password" placeholder="your password">
                <br>
            </div>
            <p style="font-size: 0.95rem;"><a href="./forgetPass.html">Forgot Password? </a></p>
            
            <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></p>

            <button id="loginBtn" class="btn-primary mb-3"><i class="bi bi-box-arrow-in-right"></i> Login</button>
            
            <p style="font-size: 0.95rem;">Don't have an account? <a href="register.html">Create one now</a></p>
            <div class="mt-3">
                <a href="index.html" style="font-size: 0.85rem; color: var(--text-light);"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/login.js"></script>
</body>
</html>
