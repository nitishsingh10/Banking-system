<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="background-image">
    <div id="loginForm" class="card">
        <h1>Login to your account</h1>
        <p>Enter the registered details</p>
        <div>
            <label for="email"><i class="bi bi-envelope"></i> Enter your email</label><br>
            <input type="email" id="email" placeholder="registered email">
        </div>
        <br>
        <div>
            <label for="password"><i class="bi bi-lock"></i> Enter your password</label><br>
            <input type="password" id="password" placeholder="your password">
        </div>
        <br>
        <p id="errorMsg" style="color: red; display: none;"></p>

        <button id="loginBtn" class="btn-primary"><i class="bi bi-box-arrow-in-right"></i> Login</button>
        <br><br>
        <p>Doesn't have an account? <a href="register.html">Create Now</a></p>
    </div>


    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/login.js"></script>
</body>
</html>
